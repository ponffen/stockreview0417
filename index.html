<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>持仓收益</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">新浪财经客户端专享</p>
          <h1>持仓收益</h1>
        </div>
        <button id="demoToggleBtn" class="ghost-btn">查看演示数据</button>
      </header>

      <nav class="top-tabs" id="topTabs">
        <button class="tab-btn active" data-route="earning">收益</button>
        <button class="tab-btn" data-route="analysis">分析</button>
        <button class="tab-btn" data-route="records">交易记录</button>
      </nav>

      <section id="route-earning" class="route-view active">
        <div class="card overview-card">
          <div class="overview-grid" id="overviewGrid"></div>
          <p class="help-tip">
            提示：算法接口尚未接入，当前数据按占位规则计算，后续可替换为你的正式算法。
          </p>
        </div>

        <div class="card">
          <div class="section-head">
            <h2>个股收益</h2>
            <button id="quickTradeBtn" class="primary-btn">新建交易</button>
          </div>
          <div id="positionList" class="position-list"></div>
        </div>
      </section>

      <section id="route-analysis" class="route-view">
        <div class="card">
          <div class="section-head">
            <h2>收益率算法</h2>
          </div>
          <div class="form-row">
            <label for="algoMode">计算方式</label>
            <select id="algoMode">
              <option value="cost">成本算法</option>
              <option value="money">资金加权</option>
              <option value="time">时间加权</option>
            </select>
          </div>
          <div class="form-row">
            <label for="benchmark">指数对比</label>
            <select id="benchmark">
              <option value="none">不对比</option>
              <option value="sh000001">上证指数</option>
              <option value="sz399001">深证成指</option>
              <option value="hsi">恒生指数</option>
              <option value="sp500">标普500</option>
            </select>
          </div>
          <div class="chip-row">
            <button class="chip active" data-range="7">最近一周</button>
            <button class="chip" data-range="30">最近一个月</button>
            <button class="chip" data-range="90">最近三个月</button>
            <button class="chip" data-range="365">年初至今</button>
          </div>
        </div>

        <div class="card">
          <div class="section-head">
            <h2>收益走势</h2>
            <span class="muted" id="analysisSummary"></span>
          </div>
          <canvas id="analysisChart" width="700" height="320"></canvas>
        </div>
      </section>

      <section id="route-records" class="route-view">
        <div class="card">
          <div class="section-head">
            <h2>交易记录</h2>
            <button id="recordTradeBtn" class="primary-btn">新建交易</button>
          </div>
          <div id="recordList" class="record-list"></div>
        </div>
      </section>
    </main>

    <dialog id="tradeDialog" class="trade-dialog">
      <form id="tradeForm" method="dialog">
        <div class="section-head">
          <h2>新建交易</h2>
          <button type="button" id="closeDialogBtn" class="ghost-btn">关闭</button>
        </div>

        <div class="form-row">
          <label for="tradeSymbol">代码</label>
          <input id="tradeSymbol" name="symbol" required placeholder="如 600519" />
        </div>
        <div class="form-row">
          <label for="tradeName">名称</label>
          <input id="tradeName" name="name" required placeholder="如 贵州茅台" />
        </div>
        <div class="form-row">
          <label for="tradeSide">方向</label>
          <select id="tradeSide" name="side">
            <option value="buy">买入</option>
            <option value="sell">卖出</option>
          </select>
        </div>
        <div class="form-row">
          <label for="tradePrice">成交价</label>
          <input id="tradePrice" name="price" type="number" step="0.001" required />
        </div>
        <div class="form-row">
          <label for="tradeQuantity">数量</label>
          <input id="tradeQuantity" name="quantity" type="number" step="1" required />
        </div>
        <div class="form-row">
          <label for="tradeDate">成交日期</label>
          <input id="tradeDate" name="date" type="date" required />
        </div>
        <div class="form-row">
          <label for="tradeNote">备注</label>
          <input id="tradeNote" name="note" placeholder="可选" />
        </div>
        <div class="dialog-foot">
          <button type="submit" class="primary-btn wide">保存交易</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
